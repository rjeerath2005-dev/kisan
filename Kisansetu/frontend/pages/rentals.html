<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vivasayin Kanakku – Rental Ledger</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .ledger-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      border-left: 5px solid var(--border);
      transition: box-shadow 0.2s;
    }
    .ledger-card:hover { box-shadow: var(--shadow-hover); }
    .ledger-card.paid { border-left-color: var(--green-mid); }
    .ledger-card.partial { border-left-color: var(--amber); }
    .ledger-card.pending { border-left-color: var(--red); }
    .lc-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
    .lc-name { font-size: 17px; font-weight: 700; color: var(--text-dark); }
    .lc-phone { font-size: 13px; color: var(--text-light); }
    .lc-tractor { font-size: 13px; color: var(--green-mid); font-weight: 600; }
    .lc-meta { display: flex; gap: 16px; flex-wrap: wrap; margin: 10px 0; }
    .lc-meta-item { font-size: 13px; color: var(--text-mid); }
    .lc-meta-item strong { color: var(--text-dark); }
    .pay-bar { background: var(--bg); border-radius: 6px; height: 8px; margin: 8px 0; overflow: hidden; }
    .pay-fill { height: 100%; border-radius: 6px; background: var(--green-mid); transition: width 0.5s ease; }
    .pay-fill.partial { background: var(--amber); }
    .pay-fill.pending { background: var(--red); }
    .lc-amounts { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
    .lc-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .pay-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pay-form input { width: 130px; }
    .pay-form select { width: 100px; }
    .summary-row { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 24px; }
    .sum-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      flex: 1;
      min-width: 150px;
      text-align: center;
    }
    .sum-box .sv { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    .sum-box .sl { font-size: 12px; color: var(--text-light); font-weight: 500; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="logo-icon">🌾</span>
      <h1>Vivasayin Kanakku</h1>
      <span>Smart Farm Management</span>
    </div>
    <nav>
      <a href="index.html" class="nav-item" data-page="dashboard"><span class="icon">📊</span><span class="nav-label">Dashboard</span></a>
      <a href="tracker.html" class="nav-item" data-page="tracker"><span class="icon">💰</span><span class="nav-label">Expense & Income</span></a>
      
      <a href="tractors.html" class="nav-item" data-page="tractors"><span class="icon">🚜</span><span class="nav-label">Tractor Rental</span></a>
      <a href="rentals.html" class="nav-item active" data-page="rentals"><span class="icon">📋</span><span class="nav-label">Rental Ledger</span></a>
      <a href="about.html" class="nav-item" data-page="about"><span class="icon">ℹ️</span><span class="nav-label">About</span></a>
    </nav>
    <div class="sidebar-footer">Vivasayin Kanakku v1.0</div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-toggle">☰</button>
        <h2>📋 Rental Ledger</h2>
      </div>
      <div class="topbar-right">
        <div class="farmer-badge"><div class="avatar">🧑‍🌾</div><span>Ram Patel</span></div>
      </div>
    </header>

    <main class="page-content">
      <!-- Summary -->
      <div class="summary-row" id="summaryRow">
        <div class="sum-box"><div class="sv" style="color:var(--green-dark)" id="sTotal">—</div><div class="sl">Total Billed</div></div>
        <div class="sum-box"><div class="sv" style="color:var(--green-mid)" id="sPaid">—</div><div class="sl">Collected</div></div>
        <div class="sum-box"><div class="sv" style="color:var(--amber)" id="sPending">—</div><div class="sl">Pending / Due</div></div>
        <div class="sum-box"><div class="sv" style="color:var(--blue)" id="sCount">—</div><div class="sl">Total Rentals</div></div>
      </div>

      <!-- Filters -->
      <div class="filter-bar" style="margin-bottom:18px;">
        <input type="text" id="searchRenter" placeholder="🔍 Search by name/tractor..." oninput="filterRentals()" style="width:230px;"/>
        <select id="filterStatus" onchange="filterRentals()">
          <option value="">All Status</option>
          <option value="Paid">Paid</option>
          <option value="Partial">Partial</option>
          <option value="Pending">Pending</option>
        </select>
      </div>

      <div id="ledgerList">
        <div class="empty-state"><div class="empty-icon">🔄</div><p>Loading rentals...</p></div>
      </div>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script>
    let allRentals = [];

    function fmtDateTime(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      const day = String(d.getDate()).padStart(2,'0');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const mon = months[d.getMonth()];
      const yr = d.getFullYear();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${day} ${mon} ${yr}, ${hh}:${mm}`;
    }

    async function loadRentals() {
      const data = await apiFetch('/rentals');
      if (!data) return;
      allRentals = data.reverse(); // newest first

      const total = data.reduce((s,r) => s + r.total_amount, 0);
      const paid = data.reduce((s,r) => s + r.paid_amount, 0);
      document.getElementById('sTotal').textContent = fmt(total);
      document.getElementById('sPaid').textContent = fmt(paid);
      document.getElementById('sPending').textContent = fmt(total - paid);
      document.getElementById('sCount').textContent = data.length;

      renderRentals(allRentals);
    }

    function filterRentals() {
      const q = document.getElementById('searchRenter').value.toLowerCase();
      const st = document.getElementById('filterStatus').value;
      const filtered = allRentals.filter(r =>
        (!st || r.payment_status === st) &&
        (!q || r.renter_name.toLowerCase().includes(q) || (r.tractor_name||'').toLowerCase().includes(q) || (r.renter_village||'').toLowerCase().includes(q))
      );
      renderRentals(filtered);
    }

    function renderRentals(list) {
      const el = document.getElementById('ledgerList');
      if (!list.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No rental records found</p></div>';
        return;
      }

      el.innerHTML = list.map(r => {
        const st = (r.payment_status || 'Pending').toLowerCase();
        const isActive = !r.end_date;  // No end_date = still active/in progress
        const pct = r.total_amount > 0 ? Math.round((r.paid_amount / r.total_amount) * 100) : 0;
        const due = r.total_amount - r.paid_amount;

        const stBadge = {paid: 'badge-green', partial: 'badge-amber', pending: 'badge-red'}[st] || 'badge-gray';
        const stLabel = {paid: '✅ Paid', partial: '⚠️ Partial', pending: '🔴 Pending'}[st] || r.payment_status;

        return `
        <div class="ledger-card ${st}">
          <div class="lc-top">
            <div>
              <div class="lc-name">👤 ${r.renter_name}</div>
              <div class="lc-phone">📞 ${r.renter_phone || '-'}  ${r.renter_village ? '📍 ' + r.renter_village : ''}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              ${isActive ? `<span class="badge" style="background:#fbbf24;color:#78350f;">🟢 Active</span>` : `<span class="badge ${stBadge}">${stLabel}</span>`}
              <button onclick="deleteRental(${r.id})" class="btn btn-danger btn-sm">🗑️</button>
            </div>
          </div>

          <div class="lc-meta">
            <div class="lc-meta-item">🚜 <strong>${r.tractor_name || 'Unknown Tractor'}</strong></div>
            <div class="lc-meta-item">🕐 <strong>${fmtDateTime(r.start_date)}</strong> → <strong>${r.end_date ? fmtDateTime(r.end_date) : '⏳ Ongoing'}</strong></div>
            ${r.days ? `<div class="lc-meta-item">⏱️ <strong>${r.days} day${r.days > 1 ? 's' : ''}</strong></div>` : ''}
            ${r.purpose ? `<div class="lc-meta-item">🌾 <strong>${r.purpose}</strong></div>` : ''}
            ${r.payment_mode && r.payment_mode !== '-' ? `<div class="lc-meta-item">💳 <strong>${r.payment_mode}</strong></div>` : ''}
          </div>

          ${isActive ? `
          <!-- ACTIVE RENTAL - SHOW MARK COMPLETE BUTTON -->
          <div style="background:#fef3c7;border-radius:6px;padding:12px;margin:10px 0;border-left:4px solid #f59e0b;">
            <div style="font-size:12px;color:#92400e;margin-bottom:8px;"><strong>⏳ Rental in progress</strong></div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-primary btn-sm" onclick="openCompleteRentalModal(${r.id}, '${r.renter_name}', '${r.tractor_name}', '${r.start_date}', ${r.paid_amount}, ${r.rate_per_hour || 0}, ${r.rate_per_day || 0})">✅ Mark Complete</button>
              <button class="btn btn-outline btn-sm" onclick="extendRental(${r.id})">⏱️ Extend Time</button>
            </div>
          </div>` : `
          <!-- COMPLETED RENTAL - SHOW PAYMENT STATUS -->
          <div class="pay-bar">
            <div class="pay-fill ${st}" style="width:${pct}%"></div>
          </div>
          <div class="lc-amounts">
            <span style="color:var(--green-dark);font-weight:600;">Paid: ${fmt(r.paid_amount)}</span>
            <span style="color:var(--text-light);">${pct}%</span>
            <span style="color:${due > 0 ? 'var(--red)' : 'var(--green-mid)'};font-weight:600;">
              ${due > 0 ? `Due: ${fmt(due)}` : `Total: ${fmt(r.total_amount)}`}
            </span>
          </div>

          ${due > 0 ? `
          <div class="lc-actions">
            <span style="font-size:13px;color:var(--text-light);font-weight:600;">Update Payment:</span>
            <div class="pay-form">
              <input type="number" class="form-group input" id="payAmt_${r.id}" placeholder="Amount" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;" max="${due}"/>
              <select id="payMode_${r.id}" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;">
                <option>Cash</option><option>UPI</option><option>Cheque</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="recordPayment(${r.id}, ${r.paid_amount}, ${r.total_amount})">💰 Record</button>
              ${due <= r.total_amount ? `<button class="btn btn-outline btn-sm" onclick="payFull(${r.id}, ${r.paid_amount}, ${r.total_amount}, '${r.id}')">✅ Full Pay</button>` : ''}
            </div>
          </div>` : `
          <div style="color:var(--green-mid);font-size:13px;font-weight:600;">✅ Payment complete — ${fmt(r.total_amount)} received</div>`}`}

          ${r.note ? `<div style="margin-top:8px;font-size:12px;color:var(--text-light);">📝 ${r.note}</div>` : ''}
        </div>`;
      }).join('');
    }

    async function recordPayment(id, currentPaid, total) {
      const amt = parseFloat(document.getElementById('payAmt_' + id).value);
      if (!amt || amt <= 0) return showToast('Enter a valid amount', true);
      const newPaid = Math.min(currentPaid + amt, total);
      const mode = document.getElementById('payMode_' + id).value;
      const res = await apiFetch('/rentals/' + id + '/pay', {
        method: 'PUT',
        body: JSON.stringify({ paid_amount: newPaid, payment_mode: mode })
      });
      if (res) { showToast('✅ Payment of ' + fmt(amt) + ' recorded!'); loadRentals(); }
    }

    async function payFull(id, currentPaid, total) {
      const mode = document.getElementById('payMode_' + id)?.value || 'Cash';
      const res = await apiFetch('/rentals/' + id + '/pay', {
        method: 'PUT',
        body: JSON.stringify({ paid_amount: total, payment_mode: mode })
      });
      if (res) { showToast('✅ Full payment marked!'); loadRentals(); }
    }

    async function deleteRental(id) {
      if (!confirm('Delete this rental record?')) return;
      await apiFetch('/rentals/' + id, { method: 'DELETE' });
      showToast('Rental record deleted');
      loadRentals();
    }

    // ===== RENTAL COMPLETION WORKFLOW =====
    let completeRentalState = {};

    function openCompleteRentalModal(rentalId, renterName, tractorName, startDate, paidAmount, ratePerHour, ratePerDay) {
      completeRentalState = { rentalId, renterName, tractorName, startDate, paidAmount, ratePerHour: ratePerHour || 0, ratePerDay: ratePerDay || 0 };
      const modal = document.getElementById('completeRentalModal');
      const overlay = document.getElementById('completeRentalOverlay');
      if (!modal) { console.error('Complete rental modal not found'); return; }

      // Parse start datetime
      const startDt = new Date(startDate);
      const pad = n => String(n).padStart(2,'0');
      const startDateStr = `${pad(startDt.getDate())}-${pad(startDt.getMonth()+1)}-${startDt.getFullYear()}`;
      const startTimeStr = `${pad(startDt.getHours())}:${pad(startDt.getMinutes())}`;
      
      document.getElementById('cr-info').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#f3f4f6;padding:12px;border-radius:6px;margin-bottom:12px;">
          <div><span style="color:var(--text-light);font-size:12px;">👤 Renter</span><div style="font-weight:600;">${renterName}</div></div>
          <div><span style="color:var(--text-light);font-size:12px;">🚜 Tractor</span><div style="font-weight:600;">${tractorName}</div></div>
          <div><span style="color:var(--text-light);font-size:12px;">📅 Start Date</span><div style="font-weight:600;">${startDateStr}</div></div>
          <div><span style="color:var(--text-light);font-size:12px;">💰 Initial Advance</span><div style="font-weight:600;color:var(--green-mid);">₹${fmt(paidAmount)}</div></div>
          <div style="grid-column:1/-1;"><span style="color:var(--text-light);font-size:12px;">💵 Rate</span><div style="font-weight:600;font-size:12px;">${(ratePerDay||0) ? '₹'+fmt(ratePerDay)+'/day' : ''}${(ratePerHour||0) ? ((ratePerDay||0)?'&nbsp;•&nbsp;':'')+' ₹'+fmt(ratePerHour)+'/hr' : (!(ratePerDay||0) ? 'Not set' : '')}</div></div>
        </div>
      `;

      // Pre-fill start time from rental data
      const startTimeInput = document.getElementById('cr-start-time');
      if (startTimeInput) startTimeInput.value = startTimeStr;

      // Set end time input to current time
      const now = new Date();
      const endTimeInput = document.getElementById('cr-end-time');
      if (endTimeInput) endTimeInput.value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      
      document.getElementById('cr-calculation').innerHTML = '<p style="color:var(--text-light);font-size:13px;">Set end time to calculate final amount...</p>';
      modal.style.display = 'block';
      if (overlay) overlay.style.display = 'block';
    }

    function closeCompleteRentalModal() {
      const modal = document.getElementById('completeRentalModal');
      const overlay = document.getElementById('completeRentalOverlay');
      if (modal) modal.style.display = 'none';
      if (overlay) overlay.style.display = 'none';
      completeRentalState = {};
    }

    function calculateCompletePrice() {
      if (!completeRentalState.rentalId) return;
      
      const startTimeStr = document.getElementById('cr-start-time')?.value; // HH:MM
      const endTimeStr = document.getElementById('cr-end-time')?.value;     // HH:MM

      if (!startTimeStr || !endTimeStr) {
        document.getElementById('cr-calculation').innerHTML = '<p style="color:var(--red);">Please set both start and end time</p>';
        return;
      }

      // Build start datetime from original date + edited start time
      const baseDt = new Date(completeRentalState.startDate);
      const [startHour, startMin] = startTimeStr.split(':').map(Number);
      const startDt = new Date(baseDt);
      startDt.setHours(startHour, startMin, 0, 0);

      // Build end datetime; if end <= start, assume end is next day
      const [endHour, endMin] = endTimeStr.split(':').map(Number);
      const endDt = new Date(startDt);
      endDt.setHours(endHour, endMin, 0, 0);
      if (endDt <= startDt) endDt.setDate(endDt.getDate() + 1);

      const diffMs = endDt - startDt;
      const totalHours = diffMs / (1000 * 60 * 60);
      const totalDays = totalHours / 24;

      // Use actual tractor rates from state, with fallback
      const ratePerDay = completeRentalState.ratePerDay || 800;
      const ratePerHour = completeRentalState.ratePerHour || (ratePerDay ? Math.round(ratePerDay / 8) : 100);

      let amount = 0;
      let durationLabel = '';
      let calcLabel = '';

      if (totalDays >= 1) {
        const fullDays = Math.floor(totalDays);
        const remainingHours = (totalDays - fullDays) * 24;
        const daysCost = fullDays * ratePerDay;
        const hoursCost = Math.round(remainingHours * ratePerHour);
        amount = daysCost + hoursCost;
        durationLabel = `${fullDays} day${fullDays > 1 ? 's' : ''}${remainingHours > 0 ? ' ' + remainingHours.toFixed(1) + ' hrs' : ''}`;
        calcLabel = `${fullDays}×₹${fmt(ratePerDay)}${remainingHours > 0 ? ` + ${remainingHours.toFixed(1)}×₹${fmt(ratePerHour)}` : ''}`;
      } else {
        amount = Math.round(totalHours * ratePerHour);
        durationLabel = `${totalHours.toFixed(1)} hours`;
        calcLabel = `${totalHours.toFixed(1)}×₹${fmt(ratePerHour)}/hr`;
      }

      const due = Math.max(0, amount - completeRentalState.paidAmount);
      completeRentalState.finalAmount = amount;
      completeRentalState.finalDue = due;
      completeRentalState.computedEndDate = endDt.toISOString();

      document.getElementById('cr-calculation').innerHTML = `
        <div style="background:#f0fdf4;border-left:4px solid var(--green-mid);padding:12px;border-radius:6px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;">
            <div>
              <span style="color:var(--text-light);font-size:12px;">Duration</span>
              <div style="font-weight:600;font-size:14px;">${durationLabel}</div>
            </div>
            <div>
              <span style="color:var(--text-light);font-size:12px;">Calculation</span>
              <div style="font-weight:600;font-size:13px;">${calcLabel}</div>
            </div>
          </div>
          <div style="border-top:1px solid #d1d5db;padding-top:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span>Total Amount:</span>
              <span style="font-weight:600;font-size:16px;color:var(--green-dark);">₹${fmt(amount)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-light);">
              <span>Already Paid:</span>
              <span>₹${fmt(completeRentalState.paidAmount)}</span>
            </div>
            ${due > 0 ? `<div style="display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid #d1d5db;font-weight:600;color:var(--red);">
              <span>Due Now:</span><span>₹${fmt(due)}</span>
            </div>` : `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #d1d5db;font-weight:600;color:var(--green-mid);">✅ Advance Sufficient</div>`}
          </div>
        </div>
      `;
    }

    async function submitCompleteRental() {
      const { rentalId, finalAmount, finalDue, computedEndDate } = completeRentalState;

      if (!computedEndDate || !finalAmount) {
        showToast('Please set end time to calculate total first', true);
        return;
      }

      const res = await apiFetch('/rentals/' + rentalId, {
        method: 'PUT',
        body: JSON.stringify({
          end_date: computedEndDate,
          total_amount: finalAmount
        })
      });

      if (res) {
        showToast(`✅ Rental completed! Total: ₹${fmt(finalAmount)} • Due: ₹${fmt(finalDue)}`);
        closeCompleteRentalModal();
        loadRentals();
      }
    }

    function extendRental(id) {
      showToast('Extend feature coming soon', false);
    }

    loadRentals();

  </script>

  <!-- Complete Rental Modal -->
  <div id="completeRentalModal" class="modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:210;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="font-size:18px;font-weight:700;margin:0;">✅ Complete Rental & Settle Amount</h3>
      <button style="cursor:pointer;font-size:22px;color:var(--text-light);background:none;border:none;line-height:1;" onclick="closeCompleteRentalModal()">✕</button>
    </div>

    <div id="cr-info" style="margin-bottom:16px;"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div>
        <label style="display:block;font-weight:600;margin-bottom:6px;color:var(--text-dark);">🕐 Start Time</label>
        <input type="time" id="cr-start-time" style="width:100%;padding:10px;border:1.5px solid #2563eb;border-radius:6px;font-family:inherit;font-size:16px;box-sizing:border-box;background:#eff6ff;" oninput="calculateCompletePrice()"/>
      </div>
      <div>
        <label style="display:block;font-weight:600;margin-bottom:6px;color:var(--text-dark);">🏁 End Time</label>
        <input type="time" id="cr-end-time" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:16px;box-sizing:border-box;" oninput="calculateCompletePrice()"/>
      </div>
    </div>

    <div id="cr-calculation" style="margin-bottom:16px;"></div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn btn-outline" onclick="closeCompleteRentalModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitCompleteRental()">✅ Mark Complete & Settle</button>
    </div>
  </div>

  <!-- Modal Overlay Background -->
  <div id="completeRentalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;" onclick="if(event.target===this)closeCompleteRentalModal()"></div>
</body>
</html>
