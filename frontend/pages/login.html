<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Vivasayin Kanakku</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .login-panel { max-width:420px; margin:60px auto; }
  </style>
</head>
<body>
  <div class="login-panel">
    <div class="card shadow">
      <div class="card-header brand">
        <div class="brand-left">
          <div class="logo-icon">🌾</div>
          <div>
            <h3>Vivasayin Kanakku</h3>
            <div class="muted">Farmer login</div>
          </div>
        </div>
      </div>

      <div class="card-body">
        <p class="lead">Sign in with your mobile number. For demo OTP use <strong>123456</strong>.</p>

        <form id="loginForm" onsubmit="event.preventDefault(); sendOtp();">
          <label class="label">Mobile number</label>
          <input id="phone" class="input" placeholder="e.g. 9876543210" inputmode="numeric" pattern="\d*" maxlength="10" />
          <div class="actions">
            <button class="btn btn-primary" type="submit">Send OTP</button>
          </div>
        </form>

        <div id="step-otp" class="hidden">
          <label class="label">Enter OTP</label>
          <input id="otp" class="input" placeholder="6-digit code" inputmode="numeric" maxlength="6" />
          <div class="muted small">An OTP has been sent to your number (demo).</div>
          <div class="actions">
            <button class="btn btn-primary" onclick="verifyOtp()">Verify OTP</button>
            <button class="btn btn-outline" onclick="resendOtp()">Resend</button>
          </div>
        </div>

        <div id="step-register" class="hidden">
          <label class="label">Your name</label>
          <input id="regName" class="input" placeholder="e.g. Ram Kumar" />
          <div class="actions">
            <button class="btn btn-primary" onclick="registerUser()">Register & Continue</button>
          </div>
        </div>

        <div id="loginMsg" class="muted small" aria-live="polite"></div>
      </div>

      <div class="card-footer">
        <small class="muted">By continuing you agree to the Vivasayin Kanakku terms.</small>
      </div>
    </div>
  </div>

<script src="../js/utils.js"></script>
<script>
  // Simple OTP flow (demo): OTP is fixed to 123456. In production, integrate SMS provider.
  let pendingNumber = null;
  function sendOtp(){
    const num = document.getElementById('phone').value.trim();
    if(!num) return showToast('Enter mobile number', true);
    pendingNumber = num;
    showToast('OTP sent (demo)');
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('step-otp').classList.remove('hidden');
    document.getElementById('loginMsg').textContent = '';
  }

  function resendOtp(){
    showToast('OTP resent (demo)');
  }

  async function verifyOtp(){
    const code = document.getElementById('otp').value.trim();
    if(code !== '123456') { showToast('Invalid OTP', true); return; }
    document.getElementById('loginMsg').textContent = 'Verified. Checking account...';
    try{
      const res = await fetch('/api/farmers/login', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({number: pendingNumber}) });
      const j = await res.json();
      if(res.ok && j.name){
        localStorage.setItem('farmer', JSON.stringify(j));
        showToast('Welcome ' + j.name + '! Redirecting...');
        setTimeout(()=> location.href = '/', 700);
      } else if (j.need_registration){
        // show registration step
        document.getElementById('step-otp').classList.add('hidden');
        document.getElementById('step-register').classList.remove('hidden');
        document.getElementById('loginMsg').textContent = 'No account found. Please register.';
      } else {
        showToast(j.error || 'Login failed', true);
      }
    }catch(e){ console.error(e); showToast('Error connecting to server', true); }
  }

  async function registerUser(){
    const name = document.getElementById('regName').value.trim();
    if(!name) return showToast('Enter name', true);
    try{
      const r = await fetch('/api/farmers', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({number: pendingNumber, name}) });
      const created = await r.json();
      if(r.ok){ localStorage.setItem('farmer', JSON.stringify(created)); showToast('Registered — redirecting...'); setTimeout(()=> location.href = '/', 700); }
      else { showToast(created.error || 'Register failed', true); }
    }catch(e){ showToast('Error', true); }
  }
</script>
</body>
</html>
